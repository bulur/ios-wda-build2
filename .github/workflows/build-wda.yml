name: Build WDA IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install ldid
        run: brew install ldid

      - name: Clone WebDriverAgent
        run: |
          git clone https://github.com/appium/WebDriverAgent.git WDA
          cd WDA
          git log --oneline -3

      - name: Build WDA (unsigned)
        run: |
          cd WDA
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.facebook.WebDriverAgentRunner

      - name: Inject xctestconfig and pseudo-sign with ldid
        run: |
          cd WDA
          RUNNER=$(find build/Build/Products/Release-iphoneos -name "WebDriverAgentRunner-Runner.app" -type d | head -1)
          if [ -z "$RUNNER" ]; then
            echo "ERROR: Runner not found"
            find build/Build/Products -name "*.app" -type d
            exit 1
          fi
          echo "Runner: $RUNNER"

          # Inject xctestconfig bundle
          XCC="$RUNNER/PlugIns/WebDriverAgentRunner.xctestconfig"
          mkdir -p "$XCC"

          python3 -c "
          import plistlib
          d = {
            'CFBundleIdentifier': 'com.facebook.WebDriverAgentRunner.xctestconfig',
            'CFBundleName': 'WebDriverAgentRunner',
            'CFBundlePackageType': 'XCTESTCONFIG',
            'CFBundleShortVersionString': '1.0',
            'CFBundleVersion': '1',
          }
          with open('$XCC/Info.plist', 'wb') as f:
            plistlib.dump(d, f, fmt=plistlib.FMT_XML)
          "

          python3 -c "
          import plistlib
          d = {
            'TestBundlePath': '__TESTHOST__/PlugIns/WebDriverAgentRunner.xctest',
            'TestHostPath': '__TESTHOST__',
            'TestingEnvironmentVariables': {
              'DYLD_FRAMEWORK_PATH': '__TESTHOST__/Frameworks:__TESTHOST__/PlugIns/WebDriverAgentRunner.xctest/Frameworks',
              'DYLD_LIBRARY_PATH': '__TESTHOST__/Frameworks:__TESTHOST__/PlugIns/WebDriverAgentRunner.xctest/Frameworks',
              'XCInjectBundleInto': '__TESTHOST__/WebDriverAgentRunner-Runner',
            },
            'AutomaticTermination': True,
          }
          with open('$XCC/WebDriverAgentRunner.xctestconfig', 'wb') as f:
            plistlib.dump(d, f, fmt=plistlib.FMT_XML)
          "

          # Pseudo-sign ALL binaries with ldid
          # This creates a valid LC_CODE_SIGNATURE that resigning tools can properly replace
          echo "=== Pseudo-signing binaries with ldid ==="

          # Main app binary
          ldid -S "$RUNNER/WebDriverAgentRunner-Runner" 2>&1

          # xctest bundle binary
          ldid -S "$RUNNER/PlugIns/WebDriverAgentRunner.xctest/WebDriverAgentRunner" 2>&1

          # WebDriverAgentLib framework
          ldid -S "$RUNNER/PlugIns/WebDriverAgentRunner.xctest/Frameworks/WebDriverAgentLib.framework/WebDriverAgentLib" 2>&1 || true

          # System frameworks
          for fw in "$RUNNER/Frameworks/"*.framework; do
            if [ -d "$fw" ]; then
              FWNAME=$(basename "$fw" .framework)
              if [ -f "$fw/$FWNAME" ]; then
                ldid -S "$fw/$FWNAME" 2>&1
                echo "Signed: $FWNAME"
              fi
            fi
          done

          # Remove dSYM
          find "$RUNNER" -name "*.dSYM" -type d -exec rm -rf {} + 2>/dev/null || true

          # Remove any existing _CodeSignature dirs so resigner creates fresh ones
          find "$RUNNER" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true

          echo "=== Signed binaries ==="
          find "$RUNNER" -type f -perm +111 | head -20

          # Package IPA
          mkdir -p Payload
          cp -r "$RUNNER" Payload/
          zip -qr WebDriverAgentRunner.ipa Payload/
          rm -rf Payload
          ls -lh WebDriverAgentRunner.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-Xcode16
          path: WDA/WebDriverAgentRunner.ipa
          retention-days: 30
