name: Build WDA IPA

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-wda.yml"

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Clone WebDriverAgent
        run: |
          git clone https://github.com/appium/WebDriverAgent.git WDA
          cd WDA
          git log --oneline -3

      - name: Build WDA with ad-hoc signing
        run: |
          cd WDA

          # Build with ad-hoc signing (-) so all bundles get proper code signatures
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.facebook.WebDriverAgentRunner

      - name: Inject xctestconfig and package IPA
        run: |
          cd WDA

          RUNNER_PATH=$(find build/Build/Products/Release-iphoneos -name "WebDriverAgentRunner-Runner.app" -type d | head -1)

          if [ -z "$RUNNER_PATH" ]; then
            echo "ERROR: WebDriverAgentRunner-Runner.app not found"
            find build/Build/Products -name "*.app" -type d
            exit 1
          fi

          echo "Found runner at: $RUNNER_PATH"

          echo "=== PlugIns ==="
          ls -laR "$RUNNER_PATH/PlugIns/" 2>/dev/null || echo "No PlugIns"

          echo "=== Code signatures ==="
          codesign -dvv "$RUNNER_PATH" 2>&1 | head -10
          echo "---"
          codesign -dvv "$RUNNER_PATH/PlugIns/WebDriverAgentRunner.xctest" 2>&1 | head -10

          # Inject xctestconfig bundle
          XCCONFIG_DIR="$RUNNER_PATH/PlugIns/WebDriverAgentRunner.xctestconfig"
          mkdir -p "$XCCONFIG_DIR"

          cat > /tmp/xctestconfig_info.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleIdentifier</key>
            <string>com.facebook.WebDriverAgentRunner.xctestconfig</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>WebDriverAgentRunner</string>
            <key>CFBundlePackageType</key>
            <string>XCTESTCONFIG</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
          </dict>
          </plist>
PLISTEOF

          cat > /tmp/xctestconfig_content.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>TestBundlePath</key>
            <string>__TESTHOST__/PlugIns/WebDriverAgentRunner.xctest</string>
            <key>TestHostPath</key>
            <string>__TESTHOST__</string>
            <key>TestingEnvironmentVariables</key>
            <dict>
              <key>DYLD_FRAMEWORK_PATH</key>
              <string>__TESTHOST__/Frameworks:__TESTHOST__/PlugIns/WebDriverAgentRunner.xctest/Frameworks</string>
              <key>DYLD_LIBRARY_PATH</key>
              <string>__TESTHOST__/Frameworks:__TESTHOST__/PlugIns/WebDriverAgentRunner.xctest/Frameworks</string>
              <key>XCInjectBundleInto</key>
              <string>__TESTHOST__/WebDriverAgentRunner-Runner</string>
            </dict>
            <key>AutomaticTermination</key>
            <true/>
          </dict>
          </plist>
PLISTEOF

          cp /tmp/xctestconfig_info.plist "$XCCONFIG_DIR/Info.plist"
          cp /tmp/xctestconfig_content.plist "$XCCONFIG_DIR/WebDriverAgentRunner.xctestconfig"

          # Re-sign the app bundle to include the new xctestconfig
          # First resign the xctestconfig
          codesign -f -s - "$XCCONFIG_DIR" 2>&1
          # Then the xctest bundle
          codesign -f -s - "$RUNNER_PATH/PlugIns/WebDriverAgentRunner.xctest" 2>&1
          # Then frameworks
          for fw in "$RUNNER_PATH/Frameworks/"*.framework "$RUNNER_PATH/PlugIns/WebDriverAgentRunner.xctest/Frameworks/"*.framework; do
            if [ -d "$fw" ]; then
              codesign -f -s - "$fw" 2>&1
            fi
          done
          # Finally the main app
          codesign -f -s - "$RUNNER_PATH" 2>&1

          echo "=== Re-signed ==="
          codesign -dvv "$RUNNER_PATH" 2>&1 | head -5

          # Remove dSYM to reduce size
          find "$RUNNER_PATH" -name "*.dSYM" -type d -exec rm -rf {} + 2>/dev/null

          # Create IPA
          mkdir -p Payload
          cp -r "$RUNNER_PATH" Payload/
          zip -qr WebDriverAgentRunner.ipa Payload/
          rm -rf Payload

          echo "=== IPA ==="
          ls -lh WebDriverAgentRunner.ipa
          unzip -l WebDriverAgentRunner.ipa | grep -E "(xctest|xctestconfig)" | head -20

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-Xcode16
          path: WDA/WebDriverAgentRunner.ipa
          retention-days: 30
