name: Build WDA IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Clone WebDriverAgent
        run: |
          git clone https://github.com/appium/WebDriverAgent.git WDA
          cd WDA
          git log --oneline -3

      - name: Build WDA with ad-hoc signing
        run: |
          cd WDA
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.facebook.WebDriverAgentRunner

      - name: Inject xctestconfig and re-sign
        run: |
          cd WDA
          RUNNER_PATH=$(find build/Build/Products/Release-iphoneos -name "WebDriverAgentRunner-Runner.app" -type d | head -1)
          if [ -z "$RUNNER_PATH" ]; then
            echo "ERROR: Runner not found"
            find build/Build/Products -name "*.app" -type d
            exit 1
          fi
          echo "Runner: $RUNNER_PATH"

          # Inject xctestconfig bundle
          XCCONFIG="$RUNNER_PATH/PlugIns/WebDriverAgentRunner.xctestconfig"
          mkdir -p "$XCCONFIG"

          cat > "$XCCONFIG/Info.plist" << 'PLEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleIdentifier</key><string>com.facebook.WebDriverAgentRunner.xctestconfig</string>
          <key>CFBundleName</key><string>WebDriverAgentRunner</string>
          <key>CFBundlePackageType</key><string>XCTESTCONFIG</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>CFBundleVersion</key><string>1</string>
          </dict></plist>
PLEOF

          cat > "$XCCONFIG/WebDriverAgentRunner.xctestconfig" << 'PLEOF2'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>TestBundlePath</key><string>__TESTHOST__/PlugIns/WebDriverAgentRunner.xctest</string>
          <key>TestHostPath</key><string>__TESTHOST__</string>
          <key>TestingEnvironmentVariables</key><dict>
          <key>DYLD_FRAMEWORK_PATH</key><string>__TESTHOST__/Frameworks:__TESTHOST__/PlugIns/WebDriverAgentRunner.xctest/Frameworks</string>
          <key>DYLD_LIBRARY_PATH</key><string>__TESTHOST__/Frameworks:__TESTHOST__/PlugIns/WebDriverAgentRunner.xctest/Frameworks</string>
          <key>XCInjectBundleInto</key><string>__TESTHOST__/WebDriverAgentRunner-Runner</string>
          </dict>
          <key>AutomaticTermination</key><true/>
          </dict></plist>
PLEOF2

          # Re-sign all bundles bottom-up
          codesign -f -s - "$XCCONFIG" 2>&1
          codesign -f -s - "$RUNNER_PATH/PlugIns/WebDriverAgentRunner.xctest/Frameworks/WebDriverAgentLib.framework" 2>&1 || true
          codesign -f -s - "$RUNNER_PATH/PlugIns/WebDriverAgentRunner.xctest" 2>&1
          for fw in "$RUNNER_PATH/Frameworks/"*.framework; do
            [ -d "$fw" ] && codesign -f -s - "$fw" 2>&1
          done
          codesign -f -s - "$RUNNER_PATH" 2>&1

          echo "=== Verified signatures ==="
          codesign -v "$RUNNER_PATH" 2>&1 && echo "Main app: OK" || echo "Main app: FAIL"
          codesign -v "$RUNNER_PATH/PlugIns/WebDriverAgentRunner.xctest" 2>&1 && echo "xctest: OK" || echo "xctest: FAIL"

          # Remove dSYM
          find "$RUNNER_PATH" -name "*.dSYM" -type d -exec rm -rf {} + 2>/dev/null || true

          # Package IPA
          mkdir -p Payload
          cp -r "$RUNNER_PATH" Payload/
          zip -qr WebDriverAgentRunner.ipa Payload/
          rm -rf Payload

          ls -lh WebDriverAgentRunner.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-Xcode16
          path: WDA/WebDriverAgentRunner.ipa
          retention-days: 30
