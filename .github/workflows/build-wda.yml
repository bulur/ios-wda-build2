name: Build WDA IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Clone WebDriverAgent
        run: |
          git clone https://github.com/appium/WebDriverAgent.git WDA
          cd WDA
          git log --oneline -3

      - name: Build WDA with ad-hoc signing
        run: |
          cd WDA
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.facebook.WebDriverAgentRunner

      - name: Inject xctestconfig and re-sign
        run: |
          cd WDA
          RUNNER=$(find build/Build/Products/Release-iphoneos -name "WebDriverAgentRunner-Runner.app" -type d | head -1)
          if [ -z "$RUNNER" ]; then
            echo "ERROR: Runner not found"
            find build/Build/Products -name "*.app" -type d
            exit 1
          fi
          echo "Runner: $RUNNER"

          XCC="$RUNNER/PlugIns/WebDriverAgentRunner.xctestconfig"
          mkdir -p "$XCC"

          # Write xctestconfig Info.plist using python to avoid heredoc issues
          python3 -c "
          import plistlib
          d = {
            'CFBundleIdentifier': 'com.facebook.WebDriverAgentRunner.xctestconfig',
            'CFBundleName': 'WebDriverAgentRunner',
            'CFBundlePackageType': 'XCTESTCONFIG',
            'CFBundleShortVersionString': '1.0',
            'CFBundleVersion': '1',
          }
          with open('$XCC/Info.plist', 'wb') as f:
            plistlib.dump(d, f, fmt=plistlib.FMT_XML)
          "

          # Write xctestconfig content
          python3 -c "
          import plistlib
          d = {
            'TestBundlePath': '__TESTHOST__/PlugIns/WebDriverAgentRunner.xctest',
            'TestHostPath': '__TESTHOST__',
            'TestingEnvironmentVariables': {
              'DYLD_FRAMEWORK_PATH': '__TESTHOST__/Frameworks:__TESTHOST__/PlugIns/WebDriverAgentRunner.xctest/Frameworks',
              'DYLD_LIBRARY_PATH': '__TESTHOST__/Frameworks:__TESTHOST__/PlugIns/WebDriverAgentRunner.xctest/Frameworks',
              'XCInjectBundleInto': '__TESTHOST__/WebDriverAgentRunner-Runner',
            },
            'AutomaticTermination': True,
          }
          with open('$XCC/WebDriverAgentRunner.xctestconfig', 'wb') as f:
            plistlib.dump(d, f, fmt=plistlib.FMT_XML)
          "

          # Re-sign all bundles bottom-up
          codesign -f -s - "$XCC" 2>&1
          codesign -f -s - "$RUNNER/PlugIns/WebDriverAgentRunner.xctest/Frameworks/WebDriverAgentLib.framework" 2>&1 || true
          codesign -f -s - "$RUNNER/PlugIns/WebDriverAgentRunner.xctest" 2>&1
          for fw in "$RUNNER/Frameworks/"*.framework; do
            [ -d "$fw" ] && codesign -f -s - "$fw" 2>&1
          done
          codesign -f -s - "$RUNNER" 2>&1

          echo "=== Verify signatures ==="
          codesign -v "$RUNNER" 2>&1 && echo "Main: OK" || echo "Main: FAIL"
          codesign -v "$RUNNER/PlugIns/WebDriverAgentRunner.xctest" 2>&1 && echo "xctest: OK" || echo "xctest: FAIL"

          # Remove dSYM
          find "$RUNNER" -name "*.dSYM" -type d -exec rm -rf {} + 2>/dev/null || true

          # Package IPA
          mkdir -p Payload
          cp -r "$RUNNER" Payload/
          zip -qr WebDriverAgentRunner.ipa Payload/
          rm -rf Payload
          ls -lh WebDriverAgentRunner.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-Xcode16
          path: WDA/WebDriverAgentRunner.ipa
          retention-days: 30
